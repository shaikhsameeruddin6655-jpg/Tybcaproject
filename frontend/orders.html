<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Paints Works</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/orders.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Colorful Background Elements -->
    <div class="colorful-bg"></div>
    <div class="color-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Header Navigation -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <i class="fas fa-paint-brush"></i>
                    <span>Paints Works</span>
                </div>
                <div class="nav-menu" id="navMenu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="index.html#products" class="nav-link">Products</a>
                    <a href="index.html#services" class="nav-link">Services</a>
                    <a href="estimate-calculator.html" class="nav-link">Estimate Calculator</a>
                    <a href="index.html#contact" class="nav-link">Contact</a>
                </div>
                <div class="nav-actions">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="btn btn-outline" onclick="auth.showLoginModal()">Login</button>
                    <button class="btn btn-primary" onclick="auth.showSignupModal()">Sign Up</button>
                    <div class="mobile-menu-toggle" id="mobileMenuToggle">
                        <i class="fas fa-bars"></i>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="index.html#products" class="mobile-nav-item">
            <i class="fas fa-palette"></i>
            <span>Products</span>
        </a>
        <a href="cart.html" class="mobile-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>
        <a href="#" class="mobile-nav-item" onclick="auth.showProfileModal()">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1>My Orders</h1>
                <p>Track and manage your painting service orders</p>
            </div>

            <!-- Order Filters -->
            <div class="order-filters">
                <div class="filter-group">
                    <button class="filter-btn active" data-status="all">All Orders</button>
                    <button class="filter-btn" data-status="pending">Pending</button>
                    <button class="filter-btn" data-status="confirmed">Confirmed</button>
                    <button class="filter-btn" data-status="in-progress">In Progress</button>
                    <button class="filter-btn" data-status="completed">Completed</button>
                    <button class="filter-btn" data-status="cancelled">Cancelled</button>
                </div>
                <div class="search-group">
                    <input type="text" id="orderSearch" placeholder="Search orders...">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <!-- Orders List -->
            <div class="orders-list" id="ordersList">
                <!-- Orders will be loaded here -->
            </div>

            <!-- Empty State -->
            <div class="empty-orders" id="emptyOrders" style="display: none;">
                <div class="empty-orders-content">
                    <i class="fas fa-clipboard-list fa-4x text-light"></i>
                    <h3>No Orders Found</h3>
                    <p>You haven't placed any orders yet. Start by browsing our painting services!</p>
                    <button class="btn btn-primary btn-large" onclick="location.href='index.html#products'">
                        <i class="fas fa-palette"></i>
                        Browse Products
                    </button>
                </div>
            </div>

            <!-- Load More -->
            <div class="load-more-container">
                <button class="btn btn-outline" id="loadMoreOrders">Load More Orders</button>
            </div>
        </div>
    </main>

    <!-- Order Details Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="modal-close" onclick="closeOrderModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="order-details-content" id="orderDetailsContent">
                    <!-- Order details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <!-- Scripts -->
    <script src="../javascript/main.js"></script>
    <script src="../javascript/auth.js"></script>
    <script src="../javascript/orders.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/orders.js"></script>
</body>
</html>
